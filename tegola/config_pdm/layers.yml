field_sets:
  osm_id:
    - name: osm_id
      sql: osm_id::text
  geomt:
    - name: geom
      sql: ST_AsMVTGeom(ST_SimplifyPreserveTopology(geometry, !PIXEL_WIDTH! / 4), !BBOX!)
  geom:
    - name: geom
      sql: ST_AsMVTGeom(ST_SimplifyPreserveTopology(geom, !PIXEL_WIDTH! / 4), !BBOX!)
  tags_hstore:
    - name: tags
      sql: to_json(tags)::text
  tags:
    - name: tags
      sql: tags::text
  boundary:
    - name: project_id
    - name: admin_level
    - name: boundary
    - name: name
  stats:
    - name: stats
      sql: stats::text
    - name: delta_project
    - name: delta_daily
      
layers:
  # PDM Enedis - Poteaux
  - name: pdm_project_poteaux
    map:
      - pdm_project_poteaux
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, osm_id, tags]
    id_field: gid
    from: pdm_project_poteaux
    where: geom && !BBOX!

  - name: pdm_project_poteaux_eld
    map:
      - pdm_project_poteaux
    geometry_type: Point
    min_zoom: 7
    max_zoom: 15
    field_sets: [geom, osm_id, tags]
    id_field: gid
    from: pdm_project_poteaux_other
    where: geom && !BBOX!

  - name: pdm_project_poteaux_operator
    map:
      - pdm_project_poteaux
    geometry_type: Point
    min_zoom: 7
    max_zoom: 15
    field_sets: [geom, osm_id, tags]
    id_field: gid
    from: pdm_project_poteaux_noop
    where: geom && !BBOX!

  - name: pdm_stats_poteaux
    map:
      - pdm_stats_poteaux
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, boundary, stats]
    id_field: id
    from: pdm_boundary_tiles
    where: >
      project_id=1
      AND geom && !BBOX!
      AND ((admin_level=4 AND !ZOOM! <= 5) OR (admin_level=6 AND !ZOOM! BETWEEN 5 AND 8) OR (admin_level=8 AND !ZOOM! >= 8))

  # PDM Enedis - Postes électriques
  - name: pdm_project_substations
    map:
      - pdm_project_substations
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, osm_id, tags]
    id_field: gid
    from: pdm_project_substations
    where: geom && !BBOX!

  - name: pdm_stats_substations
    map:
      - pdm_stats_substations
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, boundary, stats]
    id_field: id
    from: pdm_boundary_tiles
    where: >
      project_id=2
      AND geom && !BBOX!
      AND ((admin_level=4 AND !ZOOM! <= 5) OR (admin_level=6 AND !ZOOM! BETWEEN 5 AND 8) OR (admin_level=8 AND !ZOOM! >= 8))

  # PDM FTTH - SRO
  - name: pdm_project_connpoints
    map:
      - pdm_project_connpoints
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, osm_id, tags]
    id_field: gid
    from: pdm_project_connpoints
    where: geom && !BBOX!

  - name: pdm_stats_connpoints
    map:
      - pdm_stats_connpoints
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, boundary, stats]
    id_field: id
    from: pdm_boundary_tiles
    where: >
      project_id=11
      AND geom && !BBOX!
      AND ((admin_level=4 AND !ZOOM! <= 5) OR (admin_level=6 AND !ZOOM! BETWEEN 5 AND 8) OR (admin_level=8 AND !ZOOM! >= 8))

  # PDM FTTH - Exchanges
  - name: pdm_project_exchanges
    map:
      - pdm_project_exchanges
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, osm_id, tags]
    id_field: gid
    from: pdm_project_exchanges
    where: geom && !BBOX!

  - name: pdm_stats_exchanges
    map:
      - pdm_stats_exchanges
    geometry_type: Point
    max_zoom: 15
    field_sets: [geom, boundary, stats]
    id_field: id
